# Alembic configuration file.
# This file is read by the `alembic` CLI.
# The SQLAlchemy URL is overridden in migrations/env.py via settings.py
# so we never hard-code credentials here.

[alembic]
# Path to the migrations folder (relative to this file)
script_location = app/db/migrations

# File name template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

# Maximum line length for auto-generated migration files
truncate_slug_length = 40

# Prepend sys.path with the project root so `from app.xxx import yyy` works
# when alembic is run from the backend/ directory
prepend_sys_path = .

# SQLAlchemy URL — intentionally left blank here.
# env.py reads it from app.config.settings.settings.SYNC_DATABASE_URL
sqlalchemy.url =

[post_write_hooks]
# Automatically format new migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
